[general]
live_config_reload = true

import = [
    "~/.config/alacritty/themes/noctalia.toml"
]

[window]
decorations = "None"
opacity = 1.0
dynamic_padding = true

[window.padding]
x = 8
y = 8

[font]
size = 12.5

[font.normal]
family = "FiraCode Nerd Font"

[cursor]
style = { shape = "Block", blinking = "Off" }

[mouse]
hide_when_typing = true

[selection]
save_to_clipboard = true

[scrolling]
history = 100000
multiplier = 5

[terminal]
osc52 = "CopyPaste"

[bell]
command = "None"
